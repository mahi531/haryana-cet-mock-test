<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math Mock Tests - Haryana CET Prep</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* --- CSS Variables --- */
        :root {
            /* Light Theme Animated Gradient Colors */
            --bg-color-1: #667eea;
            --bg-color-2: #764ba2;
            --bg-color-3: #4facfe;
            --bg-color-4: #00f2fe;
            
            /* Glassmorphism Variables */
            --glass-bg: rgba(255, 255, 255, 0.25);
            --glass-border: rgba(255, 255, 255, 0.4);
            --glass-shadow: rgba(31, 38, 135, 0.15);
            
            /* Text & UI */
            --text-color: #2d3748;
            --heading-color: #1a202c;
            --primary-btn: #4c51bf;
            --primary-btn-hover: #434190;
            --input-bg: rgba(255, 255, 255, 0.5);
            --card-hover-bg: rgba(255, 255, 255, 0.45);
        }

        [data-theme="dark"] {
            /* Dark Theme Animated Gradient Colors */
            --bg-color-1: #0f2027;
            --bg-color-2: #203a43;
            --bg-color-3: #2c5364;
            --bg-color-4: #141e30;
            
            /* Glassmorphism Variables */
            --glass-bg: rgba(17, 25, 40, 0.6);
            --glass-border: rgba(255, 255, 255, 0.1);
            --glass-shadow: rgba(0, 0, 0, 0.4);
            
            /* Text & UI */
            --text-color: #e2e8f0;
            --heading-color: #f7fafc;
            --primary-btn: #667eea;
            --primary-btn-hover: #5a67d8;
            --input-bg: rgba(0, 0, 0, 0.4);
            --card-hover-bg: rgba(17, 25, 40, 0.85);
        }

        /* --- Global Reset & Body --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
            transition: background-color 0.4s ease, color 0.4s ease, border-color 0.4s ease;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(45deg, var(--bg-color-1), var(--bg-color-2), var(--bg-color-3), var(--bg-color-4));
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            color: var(--text-color);
            display: flex;
            flex-direction: column;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* --- Glassmorphism Utility --- */
        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            box-shadow: 0 8px 32px 0 var(--glass-shadow);
        }

        /* --- Header Styling --- */
        header {
            position: sticky;
            top: 0;
            z-index: 1000;
            padding: 15px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom-left-radius: 20px;
            border-bottom-right-radius: 20px;
            margin-bottom: 40px;
        }

        .logo {
            font-size: 1.6rem;
            font-weight: 700;
            color: var(--heading-color);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo i {
            color: var(--primary-btn);
        }

        .search-container {
            position: relative;
            width: 35%;
            min-width: 260px;
        }

        .search-container input {
            width: 100%;
            padding: 12px 45px 12px 20px;
            border-radius: 30px;
            border: 1px solid var(--glass-border);
            background: var(--input-bg);
            color: var(--text-color);
            outline: none;
            font-size: 0.95rem;
            backdrop-filter: blur(8px);
        }

        .search-container input::placeholder {
            color: var(--text-color);
            opacity: 0.8;
        }

        .search-container i {
            position: absolute;
            right: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-color);
            cursor: pointer;
            opacity: 0.8;
        }

        .nav-actions {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .theme-toggle-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid var(--glass-border);
            font-size: 1.2rem;
            color: var(--heading-color);
            cursor: pointer;
            padding: 10px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 42px;
            width: 42px;
            transition: transform 0.3s ease, background 0.3s ease;
        }

        .theme-toggle-btn:hover {
            transform: rotate(30deg);
            background: rgba(255, 255, 255, 0.2);
        }

        .btn-auth {
            padding: 10px 22px;
            border-radius: 25px;
            font-weight: 600;
            font-size: 0.95rem;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s, background 0.3s;
        }

        .btn-login {
            background: transparent;
            color: var(--heading-color);
            border: 2px solid var(--heading-color);
        }

        .btn-register {
            background: var(--primary-btn);
            color: #fff;
            border: none;
        }

        .btn-auth:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px var(--glass-shadow);
        }
        
        .btn-register:hover {
            background: var(--primary-btn-hover);
        }

        /* --- Main Content & Grid --- */
        .main-container {
            flex: 1;
            padding: 0 5% 60px 5%;
            max-width: 1400px;
            margin: 0 auto;
            width: 100%;
        }

        .page-header {
            text-align: center;
            margin-bottom: 50px;
        }

        .page-title {
            font-size: 2.8rem;
            color: var(--heading-color);
            font-weight: 700;
            text-shadow: 0 2px 5px rgba(0,0,0,0.1);
            letter-spacing: 1px;
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 30px;
        }

        /* --- Card Styling --- */
        .gk-card {
            border-radius: 20px;
            padding: 30px 20px;
            text-align: center;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), background 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            min-height: 240px;
            position: relative;
            overflow: hidden;
        }

        /* Optional decorative circle inside card */
        .gk-card::before {
            content: '';
            position: absolute;
            top: -20px;
            right: -20px;
            width: 100px;
            height: 100px;
            background: var(--primary-btn);
            opacity: 0.1;
            border-radius: 50%;
            z-index: 0;
        }

        .gk-card:hover {
            transform: translateY(-10px);
            background: var(--card-hover-bg);
            border-color: rgba(255, 255, 255, 0.6);
        }

        .card-icon {
            font-size: 2.8rem;
            color: var(--primary-btn);
            margin-bottom: 18px;
            z-index: 1;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.1));
        }

        .card-content {
            z-index: 1;
            width: 100%;
        }

        .card-title {
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--heading-color);
            margin-bottom: 8px;
        }

        .card-subtitle {
            font-size: 0.9rem;
            color: var(--text-color);
            margin-bottom: 25px;
            opacity: 0.85;
            font-weight: 500;
        }

        .start-btn {
            display: inline-block;
            text-decoration: none;
            background: var(--primary-btn);
            color: #ffffff;
            padding: 12px 25px;
            border-radius: 30px;
            font-weight: 600;
            font-size: 1rem;
            width: 100%;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.15);
            z-index: 1;
        }

        .start-btn:hover {
            background: var(--primary-btn-hover);
            transform: scale(1.03);
            box-shadow: 0 6px 20px rgba(0,0,0,0.2);
        }

        /* --- Responsive Layout --- */
        @media (max-width: 950px) {
            header {
                flex-wrap: wrap;
                gap: 20px;
                padding: 15px 20px;
            }
            .search-container {
                order: 3;
                width: 100%;
            }
            .page-title {
                font-size: 2.2rem;
            }
        }
        
        @media (max-width: 500px) {
            .nav-actions {
                width: auto;
                gap: 10px;
            }
            .btn-auth {
                padding: 8px 16px;
                font-size: 0.85rem;
            }
            .logo {
                font-size: 1.3rem;
            }
            .grid-container {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

    <header class="glass-panel">
        <div class="logo">
            <i class="fa-solid fa-calculator"></i>
            Haryana CET Math
        </div>
        
        <div class="search-container">
            <input type="text" placeholder="Search math mock tests...">
            <i class="fa-solid fa-magnifying-glass"></i>
        </div>

        <div class="nav-actions">
            <button class="theme-toggle-btn" id="themeToggle" aria-label="Toggle Theme">
                <i class="fa-solid fa-moon"></i>
            </button>
            <button class="btn-auth btn-login">Login</button>
            <button class="btn-auth btn-register">Register</button>
        </div>
    </header>

    <main class="main-container">
        <div class="page-header">
            <h1 class="page-title">Math Mock Tests</h1>
        </div>

        <div class="grid-container" id="mockTestGrid">
            </div>
    </main>

    <script>
        // --- Dark/Light Mode Theme Logic ---
        const themeToggleBtn = document.getElementById('themeToggle');
        const themeIcon = themeToggleBtn.querySelector('i');
        const htmlElement = document.documentElement;

        // Check for saved theme
        const savedTheme = localStorage.getItem('theme');
        if (savedTheme) {
            htmlElement.setAttribute('data-theme', savedTheme);
            updateIcon(savedTheme);
        }

        // Toggle Event
        themeToggleBtn.addEventListener('click', () => {
            const currentTheme = htmlElement.getAttribute('data-theme');
            const newTheme = currentTheme === 'light' ? 'dark' : 'light';
            
            htmlElement.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
            updateIcon(newTheme);
        });

        function updateIcon(theme) {
            if (theme === 'dark') {
                themeIcon.classList.remove('fa-moon');
                themeIcon.classList.add('fa-sun');
            } else {
                themeIcon.classList.remove('fa-sun');
                themeIcon.classList.add('fa-moon');
            }
        }

        // --- Generate 40 Math Cards ---
        // Array of math related icons to loop through
        const mathIcons = [
            'fa-calculator', 
            'fa-infinity', 
            'fa-superscript', 
            'fa-wave-square', 
            'fa-square-root-variable', 
            'fa-percent', 
            'fa-divide', 
            'fa-chart-pie'
        ];

        const gridContainer = document.getElementById('mockTestGrid');
        
        // Loop to create 40 cards
        for (let i = 1; i <= 40; i++) {
            // Select an icon from the array sequentially
            const iconClass = mathIcons[(i - 1) % mathIcons.length];
            
            // Create card HTML
            const cardHTML = `
                <div class="gk-card glass-panel">
                    <div class="card-icon"><i class="fa-solid ${iconClass}"></i></div>
                    <div class="card-content">
                        <h2 class="card-title">Math Part ${i}</h2>
                        <p class="card-subtitle">25 Most Important Questions</p>
                    </div>
                    <a href="math${i}.html" class="start-btn">Start Test</a>
                </div>
            `;
            
            // Insert into grid
            gridContainer.insertAdjacentHTML('beforeend', cardHTML);
        }
    </script>
</body>
</html>
