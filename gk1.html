<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Haryana CET Group C & D Mock Test</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Noto+Sans+Devanagari:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* CSS Variables & Theming */
        :root {
            --bg-color: #e0e5ec;
            --text-color: #333333;
            --glass-bg: rgba(255, 255, 255, 0.4);
            --glass-border: rgba(255, 255, 255, 0.6);
            --glass-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.15);
            --primary-color: #4a90e2;
            --secondary-color: #8e44ad;
            --success-color: #27ae60;
            --danger-color: #e74c3c;
            --warning-color: #f39c12;
            --palette-unvisited: #bdc3c7;
            --palette-answered: #27ae60;
            --palette-unanswered: #e74c3c;
            --palette-marked: #8e44ad;
            --option-bg: rgba(255, 255, 255, 0.6);
            --option-hover: rgba(74, 144, 226, 0.2);
            --option-selected: rgba(74, 144, 226, 0.8);
            --selected-text: #ffffff;
        }

        [data-theme="dark"] {
            --bg-color: #121212;
            --text-color: #f5f5f5;
            --glass-bg: rgba(30, 30, 30, 0.6);
            --glass-border: rgba(255, 255, 255, 0.1);
            --glass-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5);
            --option-bg: rgba(50, 50, 50, 0.6);
            --option-hover: rgba(74, 144, 226, 0.3);
            --option-selected: #4a90e2;
            --selected-text: #ffffff;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Poppins', 'Noto Sans Devanagari', sans-serif;
            transition: background-color 0.3s, color 0.3s;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Glassmorphism Classes */
        .glass {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            box-shadow: var(--glass-shadow);
        }

        /* Header */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 30px;
            margin: 10px;
            z-index: 10;
        }

        .logo-title h1 {
            font-size: 1.2rem;
            font-weight: 600;
        }
        .logo-title p {
            font-size: 0.8rem;
            opacity: 0.8;
        }

        .timer-theme {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .timer {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--primary-color);
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 15px;
            border-radius: 8px;
            background: rgba(0, 0, 0, 0.05);
        }
        [data-theme="dark"] .timer {
            background: rgba(255, 255, 255, 0.1);
        }
        .timer.danger {
            color: var(--danger-color);
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        .theme-toggle {
            cursor: pointer;
            font-size: 1.5rem;
            color: var(--text-color);
            background: none;
            border: none;
            outline: none;
        }

        /* Main Layout */
        .main-container {
            display: flex;
            flex: 1;
            padding: 0 10px 10px 10px;
            gap: 15px;
            height: calc(100vh - 90px);
        }

        /* Test Section */
        .test-section {
            flex: 3;
            display: flex;
            flex-direction: column;
            padding: 20px;
            position: relative;
            overflow-y: auto;
        }

        .q-header {
            display: flex;
            justify-content: space-between;
            border-bottom: 2px solid var(--glass-border);
            padding-bottom: 10px;
            margin-bottom: 20px;
            font-weight: 600;
        }

        .question-text {
            font-size: 1.2rem;
            font-weight: 500;
            margin-bottom: 25px;
            line-height: 1.6;
        }

        .options-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 30px;
        }

        .option {
            padding: 15px 20px;
            background: var(--option-bg);
            border: 1px solid var(--glass-border);
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 15px;
            font-size: 1.05rem;
            transition: all 0.2s ease;
        }

        .option:hover {
            background: var(--option-hover);
            transform: translateX(5px);
        }

        .option.selected {
            background: var(--option-selected);
            color: var(--selected-text);
            border-color: var(--option-selected);
        }

        .option-marker {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--glass-bg);
            font-weight: 600;
            color: inherit;
            border: 1px solid currentColor;
        }

        .actions {
            margin-top: auto;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: space-between;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s;
            color: #fff;
        }
        
        .btn:hover { opacity: 0.9; transform: translateY(-2px); }
        .btn:active { transform: translateY(0); }

        .btn-prev { background-color: #7f8c8d; }
        .btn-next { background-color: var(--primary-color); }
        .btn-mark { background-color: var(--warning-color); }
        .btn-clear { background-color: var(--danger-color); }
        .btn-submit { background-color: var(--success-color); width: 100%; margin-top: 10px; justify-content: center; font-size: 1.1rem; padding: 12px;}

        /* Palette Section */
        .palette-section {
            flex: 1;
            padding: 20px;
            display: flex;
            flex-direction: column;
            min-width: 280px;
            overflow-y: auto;
        }

        .palette-title {
            text-align: center;
            font-weight: 600;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid var(--glass-border);
        }

        .palette-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(45px, 1fr));
            gap: 10px;
            margin-bottom: 25px;
        }

        .pal-btn {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            border: none;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            color: white;
            background-color: var(--palette-unvisited);
            transition: transform 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        
        .pal-btn:hover { transform: scale(1.1); }

        .pal-btn.answered { background-color: var(--palette-answered); }
        .pal-btn.unanswered { background-color: var(--palette-unanswered); }
        .pal-btn.marked { background-color: var(--palette-marked); }
        .pal-btn.marked-answered { background-color: var(--palette-marked); }
        
        .pal-btn.marked-answered::after {
            content: '\f00c';
            font-family: 'Font Awesome 6 Free';
            font-weight: 900;
            position: absolute;
            bottom: -2px;
            right: -2px;
            background: var(--success-color);
            color: white;
            font-size: 0.6rem;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid var(--bg-color);
        }

        .pal-btn.active-q {
            box-shadow: 0 0 0 3px var(--bg-color), 0 0 0 5px var(--primary-color);
        }

        .legend {
            font-size: 0.85rem;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .leg-box {
            width: 20px;
            height: 20px;
            border-radius: 4px;
        }
        
        /* Result & Solutions Page */
        #result-section {
            display: none;
            padding: 30px;
            width: 90%;
            max-width: 900px;
            margin: 20px auto;
            text-align: center;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .result-header h2 { font-size: 2rem; margin-bottom: 10px; }
        .status-pass { color: var(--success-color); }
        .status-fail { color: var(--danger-color); }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px;
            margin: 30px 0;
        }

        .stat-card {
            padding: 20px;
            border-radius: 12px;
            background: var(--option-bg);
            border: 1px solid var(--glass-border);
        }
        .stat-card h3 { font-size: 2rem; margin-bottom: 5px; }
        .stat-card p { font-size: 0.9rem; opacity: 0.8; }

        .stat-correct h3 { color: var(--success-color); }
        .stat-wrong h3 { color: var(--danger-color); }
        .stat-score h3 { color: var(--primary-color); }

        .solution-container {
            margin-top: 40px;
            text-align: left;
            display: none;
        }

        .sol-card {
            padding: 20px;
            margin-bottom: 20px;
            border-radius: 12px;
            background: var(--option-bg);
            border: 1px solid var(--glass-border);
            border-left: 5px solid var(--primary-color);
        }

        .sol-q { font-weight: 600; font-size: 1.1rem; margin-bottom: 15px; }
        .sol-options { margin-bottom: 15px; padding-left: 20px; }
        .sol-options li { margin-bottom: 5px; list-style-type: lower-alpha; }
        
        .ans-badge {
            display: inline-block;
            padding: 5px 10px;
            border-radius: 5px;
            font-size: 0.9rem;
            margin-bottom: 10px;
            font-weight: 500;
        }
        .ans-correct-badge { background: rgba(39, 174, 96, 0.2); color: var(--success-color); border: 1px solid var(--success-color); }
        .ans-wrong-badge { background: rgba(231, 76, 60, 0.2); color: var(--danger-color); border: 1px solid var(--danger-color); }

        .sol-exp {
            background: rgba(0,0,0,0.05);
            padding: 15px;
            border-radius: 8px;
            font-size: 0.95rem;
            line-height: 1.6;
        }
        [data-theme="dark"] .sol-exp { background: rgba(255,255,255,0.05); }

        .cet-tip {
            margin-top: 10px;
            color: var(--secondary-color);
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        [data-theme="dark"] .cet-tip { color: #a29bfe; }

        /* Responsive */
        @media (max-width: 768px) {
            .main-container { flex-direction: column; height: auto; }
            .test-section { flex: none; height: 60vh; }
            .palette-section { min-width: 100%; flex: none; }
            .actions { justify-content: center; }
            .btn { flex: 1; min-width: 45%; justify-content: center; }
        }
    </style>
</head>
<body>

    <header class="glass">
        <div class="logo-title">
            <h1>Haryana CET Mock Test</h1>
            <p>Group C & D - General Knowledge (Set 1)</p>
        </div>
        <div class="timer-theme">
            <div class="timer" id="timer">
                <i class="fa-solid fa-clock"></i> <span id="time-display">20:00</span>
            </div>
            <button class="theme-toggle" id="theme-btn" onclick="toggleTheme()" title="Toggle Dark Mode">
                <i class="fa-solid fa-moon"></i>
            </button>
        </div>
    </header>

    <div class="main-container" id="test-screen">
        <div class="test-section glass">
            <div class="q-header">
                <span id="q-no">Question 1 of 15</span>
                <span>Marks: +1 / -0</span>
            </div>
            
            <div class="question-text" id="question-text">
                </div>

            <div class="options-container" id="options-container">
                </div>

            <div class="actions">
                <button class="btn btn-prev" onclick="changeQuestion(-1)" id="btn-prev"><i class="fa-solid fa-angle-left"></i> Previous</button>
                <button class="btn btn-mark" onclick="markForReview()"><i class="fa-solid fa-bookmark"></i> Mark for Review</button>
                <button class="btn btn-clear" onclick="clearResponse()"><i class="fa-solid fa-eraser"></i> Clear</button>
                <button class="btn btn-next" onclick="changeQuestion(1)" id="btn-next">Next <i class="fa-solid fa-angle-right"></i></button>
                <button class="btn btn-submit" onclick="confirmSubmit()"><i class="fa-solid fa-paper-plane"></i> Submit Test</button>
            </div>
        </div>

        <div class="palette-section glass">
            <div class="palette-title">Question Palette</div>
            <div class="palette-grid" id="palette-grid">
                </div>
            
            <div class="legend">
                <div class="legend-item">
                    <div class="leg-box" style="background: var(--palette-answered);"></div> <span>Answered</span>
                </div>
                <div class="legend-item">
                    <div class="leg-box" style="background: var(--palette-unanswered);"></div> <span>Not Answered</span>
                </div>
                <div class="legend-item">
                    <div class="leg-box" style="background: var(--palette-marked);"></div> <span>Marked for Review</span>
                </div>
                <div class="legend-item">
                    <div class="leg-box" style="background: var(--palette-marked); position:relative; overflow:hidden;">
                        <i class="fa-solid fa-check" style="color:var(--success-color); position:absolute; bottom:0; right:0; font-size:10px; background:#fff; border-radius:50%;"></i>
                    </div> 
                    <span>Answered & Marked</span>
                </div>
                <div class="legend-item">
                    <div class="leg-box" style="background: var(--palette-unvisited);"></div> <span>Not Visited</span>
                </div>
            </div>
        </div>
    </div>

    <div id="result-section" class="glass">
        <div class="result-header">
            <h2>Test Summary</h2>
            <h3 id="pass-fail-status"></h3>
        </div>
        
        <div class="stats-grid">
            <div class="stat-card stat-score">
                <h3 id="res-score">0/15</h3>
                <p>Marks Obtained</p>
            </div>
            <div class="stat-card">
                <h3 id="res-percent">0%</h3>
                <p>Percentage</p>
            </div>
            <div class="stat-card stat-correct">
                <h3 id="res-correct">0</h3>
                <p>Correct</p>
            </div>
            <div class="stat-card stat-wrong">
                <h3 id="res-wrong">0</h3>
                <p>Wrong</p>
            </div>
            <div class="stat-card">
                <h3 id="res-attempt">0</h3>
                <p>Attempted</p>
            </div>
            <div class="stat-card">
                <h3 id="res-unattempt">0</h3>
                <p>Unattempted</p>
            </div>
        </div>

        <button class="btn btn-next" style="width:auto; margin: 0 auto;" onclick="showSolutions()"><i class="fa-solid fa-book-open"></i> View Detailed Solutions</button>

        <div class="solution-container" id="solution-container">
            </div>
    </div>

    <script>
        // --- DATA: 15 Highly Important Questions Selected & Corrected from Provided Image ---
        const questions = [
            {
                q: "सब्जियों के उत्पादन में विश्व में भारत का कौन-सा स्थान है?",
                options: ["पहला", "दूसरा", "तीसरा", "चौथा"],
                ans: 1, // दूसरा
                exp: "विश्व में सब्जियों और फलों के उत्पादन में चीन के बाद भारत का <b>दूसरा</b> स्थान है।",
                tip: "हरियाणा CET फैक्ट: हरियाणा में सब्जियों की खेती को बढ़ावा देने के लिए 'भावांतर भरपाई योजना' लागू की गई है।"
            },
            {
                q: "'राष्ट्रीय युवा दिवस' (National Youth Day) किस तिथि को मनाया जाता है?",
                options: ["12 जनवरी", "15 जनवरी", "12 अगस्त", "28 फरवरी"],
                ans: 0, // 12 जनवरी
                exp: "राष्ट्रीय युवा दिवस प्रतिवर्ष <b>12 जनवरी</b> को स्वामी विवेकानंद की जयंती के उपलक्ष्य में मनाया जाता है। (12 अगस्त को अंतर्राष्ट्रीय युवा दिवस मनाया जाता है)।",
                tip: "मेमोरी ट्रिक: 'युवा' हमेशा 1-2 (आगे) रहने की सोचते हैं (12 Jan)।"
            },
            {
                q: "प्रसिद्ध पुस्तक 'ए टेल ऑफ टू सिटीज' (A Tale of Two Cities) के लेखक कौन हैं?",
                options: ["विलियम शेक्सपियर", "चार्ल्स डिकेंस", "लियो टॉलस्टॉय", "विलियम वर्ड्सवर्थ"],
                ans: 1, // चार्ल्स डिकेंस
                exp: "यह प्रसिद्ध उपन्यास <b>चार्ल्स डिकेंस</b> द्वारा लिखा गया है जो फ्रांसीसी क्रांति के दौरान लंदन और पेरिस पर आधारित है।",
                tip: "परीक्षा फैक्ट: यह इतिहास की सबसे अधिक बिकने वाली किताबों में से एक है।"
            },
            {
                q: "'माई स्टोरी' (My Story) निम्नलिखित में से किस महिला खिलाड़ी की आत्मकथा है?",
                options: ["सानिया मिर्जा", "सेरेना विलियम्स", "मार्टिना नवरातिलोवा", "पी. टी. उषा"],
                ans: 2, // मार्टिना नवरातिलोवा
                exp: "<b>मार्टिना नवरातिलोवा</b> एक महान टेनिस खिलाड़ी हैं, और 'माई स्टोरी' उनकी आत्मकथा है।",
                tip: "ध्यान दें: सानिया मिर्जा की आत्मकथा का नाम 'Ace Against Odds' है।"
            },
            {
                q: "कोशिका विज्ञान में 'लाइसोसोम' (Lysosome) की खोज 1958 में किसने की थी?",
                options: ["क्रिश्चियन डी. डुवे (C. de Duve)", "रॉबर्ट हुक", "कैमिलो गॉल्जी", "रॉबर्ट ब्राउन"],
                ans: 0, // डी. डुवे
                exp: "लाइसोसोम की खोज बेल्जियम के वैज्ञानिक <b>डी. डुवे (Christian de Duve)</b> ने की थी। इसे कोशिका की 'आत्मघाती थैली' (Suicide Bag) भी कहा जाता है।",
                tip: "हरियाण
