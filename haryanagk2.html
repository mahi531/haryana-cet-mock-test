<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Haryana GK Mock Test - CBT Mode</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --glass-bg: rgba(30, 41, 59, 0.7);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --review: #8b5cf6;
            --not-visited: #334155;
            --option-hover: rgba(59, 130, 246, 0.2);
            --option-selected: rgba(59, 130, 246, 0.4);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            background-attachment: fixed;
        }

        /* Glassmorphism Classes */
        .glass {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
        }

        /* Header */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 30px;
            margin: 15px;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.3);
        }

        .logo {
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--primary);
            text-shadow: 0 0 10px rgba(59, 130, 246, 0.5);
        }

        .timer-container {
            font-size: 1.2rem;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .timer-icon {
            color: var(--warning);
        }

        .submit-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }

        .submit-btn:hover {
            background: var(--primary-hover);
            transform: translateY(-2px);
        }

        /* Main Layout */
        .main-container {
            display: flex;
            flex: 1;
            gap: 20px;
            padding: 0 15px 20px 15px;
            max-width: 1400px;
            margin: 0 auto;
            width: 100%;
        }

        /* Question Section */
        .question-section {
            flex: 3;
            display: flex;
            flex-direction: column;
            padding: 25px;
            position: relative;
        }

        .q-header {
            display: flex;
            justify-content: space-between;
            border-bottom: 1px solid var(--glass-border);
            padding-bottom: 15px;
            margin-bottom: 20px;
        }

        .q-header h2 {
            font-size: 1.3rem;
            color: var(--primary);
        }

        .q-body {
            flex: 1;
            font-size: 1.2rem;
            line-height: 1.6;
        }

        .options-container {
            margin-top: 25px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .option-label {
            display: flex;
            align-items: center;
            padding: 15px 20px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .option-label:hover {
            background: var(--option-hover);
        }

        .option-label.selected {
            background: var(--option-selected);
            border-color: var(--primary);
        }

        .option-label input {
            margin-right: 15px;
            transform: scale(1.3);
            accent-color: var(--primary);
        }

        .q-actions {
            display: flex;
            justify-content: space-between;
            margin-top: 30px;
            border-top: 1px solid var(--glass-border);
            padding-top: 20px;
            gap: 10px;
            flex-wrap: wrap;
        }

        .q-actions button {
            padding: 10px 18px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            color: white;
            background: rgba(255, 255, 255, 0.1);
            transition: 0.3s;
        }

        .q-actions button:hover { background: rgba(255, 255, 255, 0.2); }
        .q-actions button.primary { background: var(--primary); }
        .q-actions button.primary:hover { background: var(--primary-hover); }

        /* Palette Section */
        .palette-section {
            flex: 1;
            padding: 20px;
            display: flex;
            flex-direction: column;
            max-width: 350px;
        }

        .palette-section h3 {
            text-align: center;
            margin-bottom: 20px;
            color: var(--text-main);
        }

        .legend-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 20px;
            font-size: 0.85rem;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .legend-box {
            width: 20px;
            height: 20px;
            border-radius: 4px;
        }

        .status-answered { background: var(--success); }
        .status-not-answered { background: var(--danger); }
        .status-not-visited { background: var(--not-visited); }
        .status-review { background: var(--review); }
        .status-review-answered {
            background: var(--review);
            position: relative;
        }
        .status-review-answered::after {
            content: '';
            position: absolute;
            bottom: 2px;
            right: 2px;
            width: 8px;
            height: 8px;
            background: var(--success);
            border-radius: 50%;
        }

        .palette-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
            overflow-y: auto;
            max-height: 400px;
            padding-right: 5px;
        }

        .palette-btn {
            aspect-ratio: 1;
            border: none;
            border-radius: 6px;
            color: white;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.2s;
            background: var(--not-visited);
        }

        .palette-btn:hover { transform: scale(1.05); }
        .palette-btn.active { box-shadow: 0 0 0 3px var(--primary); }

        /* Result Section */
        #result-container {
            display: none;
            flex-direction: column;
            padding: 20px;
        }
        
        .score-card {
            text-align: center;
            margin-bottom: 30px;
            padding: 30px;
        }

        .score-card h1 { color: var(--primary); margin-bottom: 20px; font-size: 2.5rem; }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .stat-box {
            background: rgba(255,255,255,0.05);
            padding: 20px;
            border-radius: 8px;
            border: 1px solid var(--glass-border);
        }

        .stat-box h3 { font-size: 2rem; margin-bottom: 5px; }
        .c-correct { color: var(--success); }
        .c-wrong { color: var(--danger); }
        .c-score { color: var(--primary); }

        .solution-card {
            margin-bottom: 20px;
            padding: 20px;
        }

        .sol-q { font-size: 1.2rem; font-weight: bold; margin-bottom: 15px; }
        .sol-options { margin-bottom: 15px; display: flex; flex-direction: column; gap: 8px; }
        .sol-option { 
            padding: 10px 15px; 
            border-radius: 6px; 
            background: rgba(255,255,255,0.05); 
            border: 1px solid var(--glass-border);
        }
        .sol-option.correct-ans { background: rgba(16, 185, 129, 0.2); border-color: var(--success); }
        .sol-option.wrong-ans { background: rgba(239, 68, 68, 0.2); border-color: var(--danger); }
        .sol-exp {
            background: rgba(59, 130, 246, 0.1);
            padding: 15px;
            border-left: 4px solid var(--primary);
            border-radius: 0 6px 6px 0;
            line-height: 1.5;
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.4); }

        /* Responsive */
        @media (max-width: 900px) {
            .main-container { flex-direction: column; }
            .palette-section { max-width: 100%; }
            header { flex-direction: column; gap: 15px; padding: 15px; text-align: center;}
            .q-actions { justify-content: center; }
        }
    </style>
</head>
<body>

    <div id="app">
        <header class="glass">
            <div class="logo">Haryana GK CBT Mock Test</div>
            <div class="timer-container">
                <span class="timer-icon">⏱</span>
                Time Left: <span id="time-remaining">20:00</span>
            </div>
            <button class="submit-btn" onclick="confirmSubmit()">Submit Test</button>
        </header>

        <div id="test-container" class="main-container">
            <div class="question-section glass">
                <div class="q-header">
                    <h2 id="q-no">Question 1</h2>
                </div>
                <div class="q-body">
                    <p id="q-text">Loading...</p>
                    <div class="options-container" id="options-container">
                        </div>
                </div>
                <div class="q-actions">
                    <button onclick="markForReview()">Mark for Review & Next</button>
                    <button onclick="clearResponse()">Clear Response</button>
                    <button onclick="prevQuestion()">Previous</button>
                    <button onclick="saveAndNext()" class="primary">Save & Next</button>
                </div>
            </div>
            
            <div class="palette-section glass">
                <h3>Question Palette</h3>
                <div class="legend-container">
                    <div class="legend-item"><div class="legend-box status-answered"></div> Answered</div>
                    <div class="legend-item"><div class="legend-box status-not-answered"></div> Not Answered</div>
                    <div class="legend-item"><div class="legend-box status-not-visited"></div> Not Visited</div>
                    <div class="legend-item"><div class="legend-box status-review"></div> Marked</div>
                    <div class="legend-item"><div class="legend-box status-review-answered"></div> Answered & Marked</div>
                </div>
                <div class="palette-grid" id="palette-grid">
                    </div>
            </div>
        </div>

        <div id="result-container" class="main-container">
            <div class="score-card glass">
                <h1>Test Submitted Successfully</h1>
                <h2>Your Score: <span id="r-score" class="c-score">0</span> / 25</h2>
                <div class="stats-grid">
                    <div class="stat-box"><h3>25</h3><p>Total Qs</p></div>
                    <div class="stat-box"><h3 id="r-attempted">0</h3><p>Attempted</p></div>
                    <div class="stat-box c-correct"><h3 id="r-correct">0</h3><p>Correct</p></div>
                    <div class="stat-box c-wrong"><h3 id="r-wrong">0</h3><p>Wrong</p></div>
                    <div class="stat-box"><h3 id="r-unattempted">0</h3><p>Unattempted</p></div>
                    <div class="stat-box"><h3 id="r-percent">0%</h3><p>Percentage</p></div>
                </div>
            </div>
            
            <div id="solutions-list">
                </div>
        </div>
    </div>

            },
            {
                q: "हरियाणा का कौन-सा शहर, 'गेटवे ऑफ हरियाणा' के नाम से जाना जाता है?",
                options: ["बहादुरगढ़", "मानेसर", "नारनौल", "फारुखनगर"],
                ans: 0,
                exp: "बहादुरगढ़। बहादुरगढ़ को 'गेटवे ऑफ हरियाणा' (हरियाणा का प्रवेश द्वार) कहा जाता है।"
            },
            {

                options: ["ख्वाजा खिज्र की कब्र", "रजिया सुल्तान की कब्र", "शेखचिल्ली की कब्र", "शाहजहाँ की बावली"],
                ans: 2,
                exp: "शेखचिल्ली की कब्र। इसे 'हरियाणा का ताज महल' भी कहा जाता है। यह शाहजहाँ के धर्मगुरु शेख चिल्ली का मकबरा है जिसे राष्ट्रीय धरोहर घोषित किया गया है।"

                options: ["छ: महीने", "दो महीने", "एक साल", "तीन महीने"],
                ans: 0,
                exp: "छ: महीने। अगर हरियाणा में एक पंचायत भंग हो जाती है, तो चुनाव छह महीने के भीतर होना अनिवार्य है।"
            },
            {
                q: "हरियाणा में राज्य लोक सेवा आयोग के अध्यक्ष की नियुक्ति ........ के द्वारा की जाती है।",
                options: ["भारत के राष्ट्रपति", "राज्य के राज्यपाल", "राज्य के मुख्यमंत्री", "भारत के प्रधानमंत्री"],
                ans: 1,
                exp: "राज्य के राज्यपाल। हरियाणा लोक सेवा आयोग (HPSC) के चेयरमैन और सदस्यों की नियुक्ति राज्यपाल द्वारा की जाती है।"
            },
            {
                q: "हरियाणा में महेंद्रगढ़ जिले का प्रशासनिक मुख्यालय कहाँ है?",
                options: ["नारनौल", "बिधोपुर", "अटेली", "नांगल"],
                ans: 0,
                exp: "नारनौल। महेंद्रगढ़ हरियाणा का एकमात्र ऐसा जिला है जिसका प्रशासनिक मुख्यालय उस जिले के नाम के अनुरूप शहर में न होकर नारनौल शहर में है।"
            },
            {
                q: "हरियाणा का ........ जिला खनिज संसाधनों में समृद्ध है।",
                options: ["अम्बाला", "पानीपत", "हिसार", "महेंद्रगढ़"],
                ans: 3,
                exp: "महेंद्रगढ़। महेंद्रगढ़ हरियाणा का खनिजों का भंडार कहलाता है। यहाँ चूने का पत्थर, बजरी, लौह अयस्क, एस्बेस्टस, स्लेट आदि पाए जाते हैं।"
            },
            {
                q: "भारत की पहली भारत-इजरायल कृषि परियोजना हरियाणा के करनाल जिले में स्थापित की गई है। इस परियोजना के तहत, अच्छी गुणवत्ता के ....... की खेती की जाएगी।",
                options: ["फल", "सब्जियाँ", "गेहूँ", "धान"],
                ans: 1,
                exp: "सब्जियाँ। इस परियोजना का उद्देश्य अच्छी गुणवत्ता वाली सब्जियों का उत्पादन बढ़ाना है।"
            },
            {
                q: "हरियाणा के कालेसर राष्ट्रीय उद्यान का नाम उद्यान के भीतर स्थित एक मंदिर के नाम पर रखा गया है। यह मंदिर ........ को समर्पित है।",
                options: ["विष्णु भगवान", "ब्रह्माजी", "कृष्ण भगवान", "शिव भगवान"],
                ans: 3,
                exp: "शिव भगवान। कालेसर राष्ट्रीय उद्यान के भीतर कालेश्वर महादेव का प्राचीन मंदिर स्थित है जो भगवान शिव को समर्पित है।"
            },
            {
                q: "हरियाणा राज्य का गठन कब हुआ था?",
                options: ["1 नवंबर 1966", "1 अक्टूबर 1966", "1 सितंबर 1966", "1 दिसंबर 1966"],
                ans: 0,
                exp: "1 नवंबर 1966 को पंजाब पुनर्गठन अधिनियम के तहत हरियाणा को भारत के 17वें राज्य के रूप में अलग राज्य का दर्जा मिला।"
            },
            {
                q: "हरियाणा का राजकीय पक्षी कौन सा है?",
                options: ["मोर", "काला तीतर", "कबूतर", "तोता"],
                ans: 1,
                exp: "काला तीतर (Black Francolin) हरियाणा का राजकीय पक्षी है।"
            },
            {
                q: "हरियाणा का राजकीय पशु कौन सा है?",
                options: ["बाघ", "काला हिरण", "हाथी", "शेर"],
                ans: 1,
                exp: "काला हिरण (Blackbuck) हरियाणा का राजकीय पशु है। यह मुख्य रूप से खुले मैदानों में पाया जाता है।"
            }
        ];

        // --- CBT Engine Variables ---
        let currentQuestion = 0;
        let totalQuestions = questionsData.length;
        let userAnswers = new Array(totalQuestions).fill(null);
        // Status: 0 = Not Visited, 1 = Not Answered, 2 = Answered, 3 = Review, 4 = Review & Answered
        let qStatus = new Array(totalQuestions).fill(0); 
        let timeLeft = 20 * 60; // 20 minutes in seconds
        let timerInterval;
        let testSubmitted = false;

        // --- Initialize ---
        function initTest() {
            renderPalette();
            loadQuestion(currentQuestion);
            
            // Start Timer
            timerInterval = setInterval(() => {
                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    autoSubmitTest();
                } else {
                    timeLeft--;
                    let m = Math.floor(timeLeft / 60);
                    let s = timeLeft % 60;
                    document.getElementById('time-remaining').innerText = 
                        `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
                }
            }, 1000);
        }

        // --- Render Functions ---
        function loadQuestion(index) {
            const q = questionsData[index];
            document.getElementById('q-no').innerText = `Question ${index + 1}`;
            document.getElementById('q-text').innerText = q.q;

            // Change status from Not Visited to Not Answered
            if (qStatus[index] === 0) {
                qStatus[index] = 1; 
                updatePaletteBtn(index);
            }

            const optionsContainer = document.getElementById('options-container');
            optionsContainer.innerHTML = '';

            q.options.forEach((opt, optIndex) => {
                const isSelected = userAnswers[index] === optIndex;
                const optDiv = document.createElement('div');
                optDiv.className = `option-label ${isSelected ? 'selected' : ''}`;
                optDiv.onclick = () => selectOption(optIndex);
                
                optDiv.innerHTML = `
                    <input type="radio" name="opt" value="${optIndex}" ${isSelected ? 'checked' : ''} onclick="event.stopPropagation(); selectOption(${optIndex})">
                    <span>${opt}</span>
                `;
                optionsContainer.appendChild(optDiv);
            });

            updatePaletteBtn(index);
            highlightCurrentPaletteBtn();
        }

        function renderPalette() {
            const grid = document.getElementById('palette-grid');
            grid.innerHTML = '';
            for (let i = 0; i < totalQuestions; i++) {
                const btn = document.createElement('button');
                btn.id = `pal-btn-${i}`;
                btn.className = 'palette-btn status-not-visited';
                btn.innerText = i + 1;
                btn.onclick = () => {
                    saveCurrentState();
                    currentQuestion = i;
                    loadQuestion(currentQuestion);
                };
                grid.appendChild(btn);
            }
        }

        function updatePaletteBtn(index) {
            const btn = document.getElementById(`pal-btn-${index}`);
            if (!btn) return;
            
            btn.className = 'palette-btn'; // Reset
            
            switch (qStatus[index]) {
                case 0: btn.classList.add('status-not-visited'); break;
                case 1: btn.classList.add('status-not-answered'); break;
                case 2: btn.classList.add('status-answered'); break;
                case 3: btn.classList.add('status-review'); break;
                case 4: btn.classList.add('status-review-answered'); break;
            }
        }

        function highlightCurrentPaletteBtn() {
            document.querySelectorAll('.palette-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`pal-btn-${currentQuestion}`).classList.add('active');
        }

        // --- Interactions ---
        function selectOption(optIndex) {
            userAnswers[currentQuestion] = optIndex;
            
            // Visual update
            const options = document.querySelectorAll('.option-label');
            options.forEach(opt => opt.classList.remove('selected'));
            options[optIndex].classList.add('selected');
            options[optIndex].querySelector('input').checked = true;
        }

        function saveCurrentState() {
            // Update status based on answer presence, but don't overwrite Review statuses unless explicit
            const hasAns = userAnswers[currentQuestion] !== null;
            if (qStatus[currentQuestion] !== 3 && qStatus[currentQuestion] !== 4) {
                qStatus[currentQuestion] = hasAns ? 2 : 1;
            } else {
                qStatus[currentQuestion] = hasAns ? 4 : 3;
            }
            updatePaletteBtn(currentQuestion);
        }

        function saveAndNext() {
            const hasAns = userAnswers[currentQuestion] !== null;
            qStatus[currentQuestion] = hasAns ? 2 : 1; // Resets review mark
            updatePaletteBtn(currentQuestion);
            
            if (currentQuestion < totalQuestions - 1) {
                currentQuestion++;
                loadQuestion(currentQuestion);
            }
        }

        function markForReview() {
            const hasAns = userAnswers[currentQuestion] !== null;
            qStatus[currentQuestion] = hasAns ? 4 : 3;
            updatePaletteBtn(currentQuestion);
            
            if (currentQuestion < totalQuestions - 1) {
                currentQuestion++;
                loadQuestion(currentQuestion);
            }
        }

        function clearResponse() {
            userAnswers[currentQuestion] = null;
            qStatus[currentQuestion] = 1;
            updatePaletteBtn(currentQuestion);
            loadQuestion(currentQuestion); // reload to clear UI
        }

        function prevQuestion() {
            saveCurrentState();
            if (currentQuestion > 0) {
                currentQuestion--;
                loadQuestion(currentQuestion);
            }
        }

        // --- Submit & Results ---
        function confirmSubmit() {
            if (confirm("Are you sure you want to submit the test? You cannot change your answers after submission.")) {
                submitTestLogic();
            }
        }

        function autoSubmitTest() {
            alert("Time is over! Your test has been automatically submitted.");
            submitTestLogic();
        }

        function submitTestLogic() {
            if(testSubmitted) return;
            testSubmitted = true;
            clearInterval(timerInterval);
            saveCurrentState();

            let correct = 0;
            let attempted = 0;
            
            userAnswers.forEach((ans, index) => {
                if (ans !== null) {
                    attempted++;
                    if (ans === questionsData[index].ans) correct++;
                }
            });

            const wrong = attempted - correct;
            const unattempted = totalQuestions - attempted;
            const percentage = ((correct / totalQuestions) * 100).toFixed(2);

            // Hide test, show result
            document.getElementById('test-container').style.display = 'none';
            document.querySelector('.submit-btn').style.display = 'none';
            document.getElementById('result-container').style.display = 'flex';

            // Populate Stats
            document.getElementById('r-score').innerText = correct;
            document.getElementById('r-attempted').innerText = attempted;
            document.getElementById('r-correct').innerText = correct;
            document.getElementById('r-wrong').innerText = wrong;
            document.getElementById('r-unattempted').innerText = unattempted;
            document.getElementById('r-percent').innerText = `${percentage}%`;

            renderSolutions();
            window.scrollTo(0, 0);
        }

        function renderSolutions() {
            const container = document.getElementById('solutions-list');
            
            questionsData.forEach((q, i) => {
                const userAns = userAnswers[i];
                const card = document.createElement('div');
                card.className = 'solution-card glass';
                
                let optionsHtml = '';
                q.options.forEach((opt, optIndex) => {
                    let optClass = 'sol-option';
                    let suffix = '';
                    
                    if (optIndex === q.ans) {
                        optClass += ' correct-ans';
                        suffix = ' ✔ (Correct Answer)';
                    } else if (userAns === optIndex && optIndex !== q.ans) {
                        optClass += ' wrong-ans';
                        suffix = ' ✘ (Your Answer)';
                    } else if (userAns === optIndex && optIndex === q.ans) {
                        suffix = ' ✔ (Your Correct Answer)';
                    }

                    optionsHtml += `<div class="${optClass}">${optIndex + 1}. ${opt} ${suffix}</div>`;
                });

                card.innerHTML = `
                    <div class="sol-q">Q${i + 1}. ${q.q}</div>
                    <div class="sol-options">${optionsHtml}</div>
                    <div class="sol-exp">
                        <strong>विस्तृत व्याख्या (Explanation):</strong><br>
                        ${q.exp}
                    </div>
                `;
                container.appendChild(card);
            });
        }

        // Run Init on Load
        window.onload = initTest;
    </script>
</body>
