<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Haryana GK Mock Test Part 3</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Hind:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg-light: linear-gradient(135deg, #fdfbfb 0%, #ebedee 100%); --glass-bg-light: rgba(255, 255, 255, 0.6); --glass-border-light: rgba(255, 255, 255, 0.8); --text-light: #2d3436; --text-muted-light: #636e72; --primary-color: #0984e3; --primary-hover: #74b9ff; --success: #00b894; --danger: #d63031; --warning: #fdcb6e; --shadow-light: rgba(0, 0, 0, 0.1); --bg-dark: linear-gradient(135deg, #1e1e2f 0%, #2a2a40 100%); --glass-bg-dark: rgba(30, 30, 46, 0.6); --glass-border-dark: rgba(255, 255, 255, 0.1); --text-dark: #f5f6fa; --text-muted-dark: #b2bec3; --shadow-dark: rgba(0, 0, 0, 0.3); }
        [data-theme="light"] { --app-bg: var(--bg-light); --glass-bg: var(--glass-bg-light); --glass-border: var(--glass-border-light); --text: var(--text-light); --text-muted: var(--text-muted-light); --shadow: var(--shadow-light); --option-bg: rgba(255,255,255,0.7); --option-hover: rgba(255,255,255,0.9); }
        [data-theme="dark"] { --app-bg: var(--bg-dark); --glass-bg: var(--glass-bg-dark); --glass-border: var(--glass-border-dark); --text: var(--text-dark); --text-muted: var(--text-muted-dark); --shadow: var(--shadow-dark); --option-bg: rgba(255,255,255,0.05); --option-hover: rgba(255,255,255,0.15); }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Hind', 'Poppins', sans-serif; transition: background 0.3s ease, color 0.3s ease; }
        body { background: var(--app-bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; padding: 20px; }
        .glass-panel { background: var(--glass-bg); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border: 1px solid var(--glass-border); border-radius: 16px; box-shadow: 0 8px 32px 0 var(--shadow); padding: 24px; }
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .header-title h1 { font-size: 24px; font-weight: 600; }
        .header-controls { display: flex; align-items: center; gap: 15px; }
        .timer { font-size: 18px; font-weight: bold; background: var(--primary-color); color: white; padding: 8px 16px; border-radius: 30px; letter-spacing: 1px; }
        .theme-toggle { cursor: pointer; background: none; border: none; font-size: 24px; color: var(--text); display: flex; align-items: center; justify-content: center; width: 40px; height: 40px; border-radius: 50%; background: var(--glass-bg); border: 1px solid var(--glass-border); }
        .main-container { display: flex; gap: 20px; flex: 1; }
        .test-area { flex: 3; display: flex; flex-direction: column; }
        .palette-area { flex: 1; min-width: 250px; }
        .progress-bar { height: 8px; background: var(--option-bg); border-radius: 4px; margin-bottom: 20px; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--primary-color); width: 0%; transition: width 0.3s ease; }
        .question-header { font-size: 22px; font-weight: 600; margin-bottom: 20px; line-height: 1.4; }
        .options-list { display: flex; flex-direction: column; gap: 12px; margin-bottom: 30px; }
        .option { background: var(--option-bg); border: 1px solid var(--glass-border); padding: 16px 20px; border-radius: 12px; cursor: pointer; font-size: 18px; display: flex; align-items: center; gap: 15px; transition: all 0.2s; }
        .option:hover { background: var(--option-hover); transform: translateY(-2px); }
        .option.selected { background: var(--primary-color); color: white; border-color: var(--primary-color); }
        .option-label { font-weight: bold; background: rgba(0,0,0,0.1); width: 30px; height: 30px; display: flex; align-items: center; justify-content: center; border-radius: 50%; }
        .controls { display: flex; justify-content: space-between; margin-top: auto; }
        .btn { padding: 12px 24px; border: none; border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer; transition: all 0.2s; color: white; }
        .btn-prev { background: var(--text-muted); } .btn-next { background: var(--primary-color); } .btn-submit { background: var(--success); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; } .btn:hover:not(:disabled) { opacity: 0.9; transform: scale(1.02); }
        .palette-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin-top: 15px; }
        .palette-btn { aspect-ratio: 1; border: 1px solid var(--glass-border); background: var(--option-bg); color: var(--text); border-radius: 8px; font-size: 14px; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .palette-btn.attempted { background: var(--primary-color); color: white; border-color: var(--primary-color); }
        .palette-btn.active { box-shadow: 0 0 0 3px var(--text); }
        .palette-title { font-size: 18px; font-weight: 600; margin-bottom: 10px; text-align: center; }
        .hidden { display: none !important; }
        .result-dashboard { display: flex; flex-direction: column; gap: 20px; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: var(--glass-bg); border: 1px solid var(--glass-border); border-radius: 12px; padding: 20px; text-align: center; }
        .stat-value { font-size: 32px; font-weight: bold; margin-bottom: 5px; }
        .stat-label { font-size: 14px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; }
        .color-success { color: var(--success); } .color-danger { color: var(--danger); } .color-primary { color: var(--primary-color); } .color-warning { color: var(--warning); }
        .review-section { display: flex; flex-direction: column; gap: 20px; }
        .review-card { padding: 20px; border-radius: 12px; border-left: 6px solid var(--text-muted); }
        .review-card.correct { border-left-color: var(--success); } .review-card.wrong { border-left-color: var(--danger); } .review-card.unattempted { border-left-color: var(--warning); }
        .review-q { font-size: 18px; font-weight: 600; margin-bottom: 15px; }
        .review-options { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .review-option { padding: 10px; border-radius: 6px; background: var(--option-bg); border: 1px solid var(--glass-border); font-size: 15px; }
        .review-option.is-correct { background: rgba(0, 184, 148, 0.2); border-color: var(--success); font-weight: bold; }
        .review-option.is-user-wrong { background: rgba(214, 48, 49, 0.2); border-color: var(--danger); }
        .explanation-box { background: rgba(0,0,0,0.05); padding: 15px; border-radius: 8px; font-size: 15px; line-height: 1.5; color: var(--text); border: 1px solid var(--glass-border); }
        [data-theme="dark"] .explanation-box { background: rgba(255,255,255,0.05); }
        .explanation-title { font-weight: bold; margin-bottom: 5px; color: var(--primary-color); }
        @media (max-width: 768px) { .main-container { flex-direction: column; } .palette-area { order: -1; } .palette-grid { grid-template-columns: repeat(10, 1fr); } .review-options { grid-template-columns: 1fr; } }
        @media (max-width: 480px) { .palette-grid { grid-template-columns: repeat(5, 1fr); } header { flex-direction: column; gap: 10px; text-align: center; } .header-controls { width: 100%; justify-content: space-between; } }
    </style>
</head>
<body data-theme="light">
    <header class="glass-panel">
        <div class="header-title"><h1>Haryana GK Mock Test - Part 3</h1></div>
        <div class="header-controls">
            <div class="timer" id="timer">25:00</div>
            <button class="theme-toggle" id="theme-btn">🌓</button>
        </div>
    </header>
    <div id="test-screen" class="main-container">
        <main class="test-area glass-panel">
            <div class="progress-bar"><div class="progress-fill" id="progress"></div></div>
            <div class="question-header" id="question-text"></div>
            <div class="options-list" id="options-container"></div>
            <div class="controls">
                <button class="btn btn-prev" id="btn-prev">पिछला</button>
                <button class="btn btn-next" id="btn-next">अगला</button>
                <button class="btn btn-submit hidden" id="btn-submit">Submit Test</button>
            </div>
        </main>
        <aside class="palette-area glass-panel">
            <div class="palette-title">Question Palette</div>
            <div style="display:flex; justify-content:space-between; font-size:12px; margin-bottom:10px;">
                <span><span style="display:inline-block; width:10px;height:10px;background:var(--primary-color);border-radius:50%;"></span> Attempted</span>
                <span><span style="display:inline-block; width:10px;height:10px;background:var(--option-bg);border:1px solid var(--glass-border);border-radius:50%;"></span> Unattempted</span>
            </div>
            <div class="palette-grid" id="palette-grid"></div>
        </aside>
    </div>
    <div id="result-screen" class="result-dashboard glass-panel hidden">
        <h2 style="text-align: center; margin-bottom: 10px; font-size: 28px;">परीक्षा परिणाम (Result)</h2>
        <div class="stats-grid">
            <div class="stat-card"><div class="stat-value color-primary" id="score-val">0/25</div><div class="stat-label">स्कोर (Score)</div></div>
            <div class="stat-card"><div class="stat-value color-primary" id="percent-val">0%</div><div class="stat-label">प्रतिशत (Percentage)</div></div>
            <div class="stat-card"><div class="stat-value color-success" id="correct-val">0</div><div class="stat-label">सही उत्तर (Correct)</div></div>
            <div class="stat-card"><div class="stat-value color-danger" id="wrong-val">0</div><div class="stat-label">गलत उत्तर (Wrong)</div></div>
            <div class="stat-card"><div class="stat-value color-warning" id="attempted-val">0</div><div class="stat-label">प्रयास किए (Attempted)</div></div>
        </div>
        <h3 style="margin-top: 20px; font-size: 22px; border-bottom: 2px solid var(--glass-border); padding-bottom: 10px;">विस्तृत समाधान (Detailed Solution)</h3>
        <div class="review-section" id="review-container"></div>
    </div>
    <script>
        const questions = [
            { id: 1, q: "कैथल जिले के फरल गाँव में निम्नलिखित में से कौन-सा मेला लगता है?", opt: ["हस्तशिल्प मेला", "पेहोवा मेला", "फल्गू मेला", "बालकनाथ मेला"], ans: 2, exp: "कैथल जिले के फरल गाँव में फल्गू मेला लगता है। यह हरियाणा के प्रसिद्ध मेलों में से एक है।" },
            { id: 2, q: "महाभारत की लड़ाई शुरू होने से पहले भगवान कृष्ण ने क्या उपदेश दिया था?", opt: ["भागवतम", "भगवद् गीता", "केन उपनिषद", "ब्रह्मा सूत्र"], ans: 1, exp: "महाभारत की लड़ाई शुरू होने से पहले भगवान श्री कृष्ण ने अर्जुन को गीता का उपदेश ज्योतिसर (कुरुक्षेत्र) में वट वृक्ष के नीचे दिया था। यहाँ आदि शंकराचार्य भी पधारे थे और महाराजा दरभंगा ने 1924 में पक्के चबूतरे का निर्माण करवाया था।" },
            { id: 3, q: "भारत कृषक समाज और अखिल भारतीय पिछड़ा वर्ग संघ के संस्थापक महासचिव कौन थे?", opt: ["रणबीर सिंह हुड्डा", "सर छोटू राम", "गंगा सिंह गुर्जर", "बाबू मूलचंद जैन"], ans: 0, exp: "चौधरी रणबीर सिंह हुड्डा भारत कृषक समाज और अखिल भारतीय पिछड़ा वर्ग संघ के संस्थापक थे। वे पूर्व मुख्यमंत्री भूपेन्द्र सिंह हुड्डा के पिता थे। 1941 के सत्याग्रह आंदोलन में भाग लेने के कारण वे पहली बार गिरफ्तार किए गए थे।" },
            { id: 4, q: "भारत के अंतिम हिन्दू सम्राट जो हरियाणा के रेवाड़ी से संबंधित थे, वे कौन थे?", opt: ["महाराजा रणविजय सिंह", "सम्राट हेमचंद्र विक्रमादित्य", "सम्राट ध्यानचंद", "पृथ्वीराज चौहान"], ans: 1, exp: "सम्राट हेमचंद्र विक्रमादित्य (हेमू) दिल्ली की गद्दी पर बैठने वाले अंतिम हिंदू शासक थे। वे मूलतः रेवाड़ी के निवासी थे। 7 अक्टूबर 1556 ई. को उन्होंने दिल्ली पर कब्जा कर स्वयं को सम्राट घोषित किया था।" },
            { id: 5, q: "निम्नलिखित में से किस समिति की सिफारिश पर हरियाणा राज्य का गठन किया गया था?", opt: ["रणविजय सिंह समिति", "हुकम सिंह समिति", "ध्यानचंद समिति", "पृथ्वीराज समिति"], ans: 1, exp: "सरदार हुकम सिंह समिति की सिफारिश के आधार पर मार्च 1966 में सर्वोच्च न्यायालय के न्यायाधीश श्री जे.सी. शाह की अध्यक्षता में पंजाब सीमा आयोग का गठन किया गया था। इसी के पश्चात 1 नवंबर 1966 को हरियाणा का गठन हुआ।" },
            { id: 6, q: "1 नवंबर, 2019 को हरियाणा के वित्त मंत्री कौन थे?", opt: ["श्री ओमप्रकाश धनखड़", "श्री अनिल विज", "श्री नरबीर सिंह", "कप्तान अभिमन्यु"], ans: 3, exp: "1 नवंबर 2019 को हरियाणा के वित्त मंत्री कैप्टन अभिमन्यु थे। नोट: वर्तमान में (14वीं विधान सभा में) हरियाणा के वित्त मंत्री स्वयं मुख्यमंत्री श्री मनोहर लाल हैं।" },
            { id: 7, q: "हरियाणा की वह अंतर्राष्ट्रीय खिलाड़ी कौन है, जिसे हाल ही में डोप टेस्ट में असफल होने की वजह से चार साल के लिए प्रतिबंधित किया गया था?", opt: ["जोगिंदर शर्मा", "विजेंद्र सिंह", "सुनील डबास", "मनप्रीत कौर"], ans: 3, exp: "मनप्रीत कौर (शॉट पुट) जो कि अंतर्राष्ट्रीय खिलाड़ी हैं, उन्हें डोप टेस्ट में फेल होने के बाद NADA (National Anti Doping Agency) द्वारा 4 वर्ष के लिए प्रतिबंधित कर दिया गया था। यह प्रतिबंध 20 जुलाई 2017 से लगा था।" },
            { id: 8, q: "निम्नलिखित में से किस फिल्म अभिनेत्री का जन्म हरियाणा में नहीं हुआ है?", opt: ["प्रियंका चोपड़ा", "मल्लिका শেरावत", "पारुल गुलाटी", "परिणीति चोपड़ा"], ans: 0, exp: "प्रियंका चोपड़ा का जन्म 1982 में जमशेदपुर, बिहार (वर्तमान में झारखंड) में हुआ था। इनका संबंध हरियाणा से नहीं है। जबकि परिणीति चोपड़ा अम्बाला, मल्लिका शेरावत हिसार से व पारुल गुलाटी रोहतक से हैं।" },
            { id: 9, q: "श्री दुष्यंत चौटाला, भारतीय संसद के सबसे युवा वर्तमान सांसद, जो हरियाणा से हैं, वह किस राजनीतिक दल से संबंध रखते हैं?", opt: ["भारतीय जनता पार्टी (BJP)", "इंडियन नेशनल कांग्रेस (INC)", "जननायक जनता पार्टी (JJP)", "इंडियन नेशनल लोक दल (INLD)"], ans: 2, exp: "श्री दुष्यंत चौटाला वर्तमान में जननायक जनता पार्टी (JJP) से संबंध रखते हैं। 9 दिसम्बर 2018 को उन्होंने इंडियन नेशनल लोकदल से अलग होकर अपनी अलग पार्टी जननायक जनता दल बनाई थी। JJP का चुनाव चिह्न चाबी है।" },
            { id: 10, q: "हरियाणा सरकार द्वारा चलाए जाने वाला हरियाणा का पहला सरकारी विश्वविद्यालय किस शहर में प्रस्तावित है?", opt: ["मानेसर", "सोहना", "पटौदी", "बिलासपुर"], ans: 0, exp: "मानेसर। यह विश्वविद्यालय (गवर्नमेंट यूनिवर्सिटी) गुरुग्राम के मानेसर के कांकड़ोला में खोला जाना प्रस्तावित है। यह राज्य का पहला सरकारी विश्वविद्यालय होगा जो राज्य सरकार द्वारा संचालित होगा।" },
            { id: 11, q: "झज्जर, हरियाणा के पहलवान, बजरंग पुनिया ने वर्ल्ड रेसलिंग चैंपियनशिप 2018 में, 65 किलोग्राम की श्रेणी में ........ जीता था।", opt: ["जॉइंट-गोल्ड", "गोल्ड", "सिल्वर", "ब्रॉन्ज"], ans: 2, exp: "सिल्वर। विश्व कुश्ती चैंपियनशिप 2018 का आयोजन 20 से 28 अक्टूबर 2018 को हंगरी के बुडापेस्ट में किया गया था। इसमें झज्जर के बजरंग पुनिया ने 65 किलोग्राम की श्रेणी में सिल्वर पदक जीता था।" },
            { id: 12, q: "सम्राट अकबर किस हिंदू संत तथा कवि के संरक्षक बने?", opt: ["सूरदास", "बाणभट्ट", "वेद व्यास", "बाजे भगत"], ans: 0, exp: "सूरदास। आधुनिक फरीदाबाद जिले की बल्लभगढ़ तहसील के एक ग्राम सीही में जन्मे सूरदास बाद में मथुरा आगरा मार्ग पर गऊघाट पर बस गए। ये वल्लभाचार्य के शिष्य थे और अकबर के समकालीन थे। इनकी प्रसिद्ध रचनाएँ सूरसागर, सूर सारावली और साहित्य लहरी हैं।" },
            { id: 13, q: "निम्नलिखित में से हरियाणा के किस शहर में रेलवे कार्यशाला (workshop) स्थित है?", opt: ["अम्बाला", "जगाधरी", "भिवानी", "फरीदाबाद"], ans: 1, exp: "जगाधरी। हरियाणा के यमुनानगर जिले के जगाधरी शहर में रेलवे कार्यशाला (workshop) स्थित है।" },
            { id: 14, q: "........ हरियाणा के प्रसिद्ध अभिनेता-निर्देशक-थियेटर व्यक्ति थे, जिनकी एक निर्देशक के रूप में पहली फिल्म 'रूप की रानी चोरों का राजा' थी।", opt: ["डेविड धवन", "कुंदन शाह", "शेखर कपूर", "सतीश कौशिक"], ans: 3, exp: "सतीश कौशिक। इनका जन्म 13 अप्रैल 1956 को हरियाणा के महेंद्रगढ़ जिले के धनोंदा गाँव में हुआ था। इन्होंने सहायक निर्देशक के रूप में शेखर कपूर की फिल्म 'मासूम' (1983) से शुरुआत की थी। निर्देशक के रूप में पहली फिल्म 'रूप की रानी चोरों का राजा' थी।" },

            { id: 18, q: "पिपली मिनी चिड़ियाघर किस जिले में स्थित है?", opt: ["सिरसा", "करनाल", "फरीदाबाद", "कुरुक्षेत्र"], ans: 3, exp: "कुरुक्षेत्र। पिपली मिनी चिड़ियाघर कुरुक्षेत्र के पिपली में स्थित है। इसके अलावा हरियाणा में 2 और मिनी चिड़ियाघर स्थित हैं - भिवानी तथा रोहतक में।" },
            { id: 19, q: "हरियाणा में कौन-सा बाँध, हाइड्रोलिक इंजीनियरिंग का एक आश्चर्य है और एक गुरुत्वाकर्षण बाँध संरचना है?", opt: ["कौशल्या बाँध", "अनंगपुर बाँध", "हथिनीकुंड बाँध", "भाखड़ा नांगल बाँध"], ans: 1, exp: "अनंगपुर बाँध। हरियाणा का अनंगपुर बाँध (फरीदाबाद) हाइड्रोलिक इंजीनियरिंग का एक आश्चर्य और एक गुरुत्वाकर्षण (ग्रेविटी) बाँध संरचना है। इसका निर्माण 8वीं शताब्दी में फरीदाबाद में अनंगपाल तोमर द्वारा किया गया था।" },
            { id: 20, q: "निम्नलिखित में से हरियाणा में सबसे अधिक खेती किस फल की होती है?", opt: ["आम", "सेब", "चेरी", "अनानास"], ans: 0, exp: "आम। हरियाणा में सबसे अधिक फलों में आम की खेती होती है। कुल रकबे में आम का 19% से अधिक योगदान है। यमुनानगर, अंबाला, कुरुक्षेत्र आदि प्रमुख उत्पादक जिले हैं। इसकी प्रमुख किस्में दशहरी, चौसा, लंगड़ा आदि हैं।" },
            { id: 21, q: "राजा ........ ने थानेसर के अलावा कन्नौज को भी अपनी राजधानी बनाया था।", opt: ["युधिष्ठिर", "पृथ्वीराज चौहान", "हर्षवर्धन", "मुहम्मद गोरी"], ans: 2, exp: "हर्षवर्धन। राजा हर्षवर्धन ने थानेसर के अलावा कन्नौज को भी अपनी राजधानी बनाया था। उन्होंने 606 ई. में हर्ष संवत् की शुरुआत की थी। उनके तीन प्रसिद्ध नाटक - 'रत्नावली', 'नागानन्दम' और 'प्रियदर्शिका' हैं।" },
            { id: 22, q: "श्री भगवत दयाल शर्मा हरियाणा के प्रथम ........ के लिए जाने जाते हैं।", opt: ["कृषि मंत्री", "मुख्यमंत्री", "राज्यपाल", "हरियाणा उच्च न्यायालय के मुख्य न्यायाधीश"], ans: 1, exp: "मुख्यमंत्री। श्री भगवत दयाल शर्मा हरियाणा के प्रथम मुख्यमंत्री के रूप में जाने जाते हैं। वे 1 नवंबर 1966 से 23 मार्च 1967 तक अपने पद पर रहे। इनका जन्म झज्जर जिले के बेरी कस्बे में हुआ था। रोहतक मेडिकल कॉलेज का नाम इनके नाम पर है।" },
            { id: 23, q: "पानीपत का ........ युद्ध भारत में मुगल साम्राज्य की शुरुआत के रूप में चिह्नित है।", opt: ["पहला", "दूसरा", "तीसरा", "चौथा"], ans: 0, exp: "पहला। पानीपत का पहला युद्ध भारत में मुगल साम्राज्य की शुरुआत के रूप में चिह्नित है। यह 21 अप्रैल 1526 ईस्वी को बाबर और दिल्ली सल्तनत के सुल्तान इब्राहिम लोधी के बीच लड़ा गया था, जिसमें लोधी की हार हुई।" },
            { id: 24, q: "हरियाणा में, निम्नलिखित में से कौन-सी जेल एक नवनिर्मित, पर्यावरण-अनुकूल जेल है?", opt: ["अम्बाला", "हिसार", "कैथल", "पानीपत"], ans: 3, exp: "पानीपत। हरियाणा में पानीपत, रेवाड़ी व नूंह में नवनिर्मित जेलें पर्यावरण अनुकूल हैं। इनमें प्रत्येक की क्षमता 1000 कैदी की है।" },
            { id: 25, q: "मसानी मेला ........ की देवी के सम्मान में आयोजित किया जाता है।", opt: ["अच्छा स्वास्थ्य", "धन", "उपजाऊपन", "चेचक"], ans: 3, exp: "चेचक। मसानी मेला चेचक की देवी के सम्मान में आयोजित किया जाता है। हरियाणा के गुरुग्राम में शीतला माता/मसानी माता का मेला लगता है और इनका प्रसिद्ध मंदिर भी यहीं स्थित है।" }
        ];
        let currentQuestion = 0; let answers = new Array(questions.length).fill(null);
        let timeLeft = 25 * 60; let timerInterval;

        const DOM = {
            themeBtn: document.getElementById('theme-btn'), timer: document.getElementById('timer'),
            progress: document.getElementById('progress'), qText: document.getElementById('question-text'),
            optContainer: document.getElementById('options-container'), btnPrev: document.getElementById('btn-prev'),
            btnNext: document.getElementById('btn-next'), btnSubmit: document.getElementById('btn-submit'),
            paletteGrid: document.getElementById('palette-grid'), testScreen: document.getElementById('test-screen'),
            resultScreen: document.getElementById('result-screen'), scoreVal: document.getElementById('score-val'),
            percentVal: document.getElementById('percent-val'), correctVal: document.getElementById('correct-val'),
            wrongVal: document.getElementById('wrong-val'), attemptedVal: document.getElementById('attempted-val'),
            reviewContainer: document.getElementById('review-container')
        };

        DOM.themeBtn.addEventListener('click', () => {
            const currentTheme = document.body.getAttribute('data-theme');
            const newTheme = currentTheme === 'light' ? 'dark' : 'light';
            document.body.setAttribute('data-theme', newTheme);
            DOM.themeBtn.innerText = newTheme === 'light' ? '🌓' : '☀️';
        });

        function init() { renderPalette(); renderQuestion(); startTimer(); }

        function startTimer() {
            timerInterval = setInterval(() => {
                if (timeLeft <= 0) { clearInterval(timerInterval); submitTest(); return; }
                timeLeft--;
                const m = Math.floor(timeLeft / 60).toString().padStart(2, '0');
                const s = (timeLeft % 60).toString().padStart(2, '0');
                DOM.timer.innerText = `${m}:${s}`;
                if (timeLeft < 300) { DOM.timer.style.background = 'var(--danger)'; }
            }, 1000);
        }

        function renderPalette() {
            DOM.paletteGrid.innerHTML = '';
            questions.forEach((_, index) => {
                const btn = document.createElement('button');
                btn.className = `palette-btn ${answers[index] !== null ? 'attempted' : ''} ${index === currentQuestion ? 'active' : ''}`;
                btn.innerText = index + 1;
                btn.onclick = () => { currentQuestion = index; renderQuestion(); };
                DOM.paletteGrid.appendChild(btn);
            });
        }

        function renderQuestion() {
            const q = questions[currentQuestion];
            DOM.qText.innerHTML = `<span style="color:var(--primary-color)">प्र. ${currentQuestion + 1}:</span> ${q.q}`;
            DOM.optContainer.innerHTML = '';
            const labels = ['A', 'B', 'C', 'D'];
            
            q.opt.forEach((optText, i) => {
                const optDiv = document.createElement('div');
                optDiv.className = `option ${answers[currentQuestion] === i ? 'selected' : ''}`;
                optDiv.innerHTML = `<span class="option-label">${labels[i]}</span> <span>${optText}</span>`;
                optDiv.onclick = () => selectOption(i);
                DOM.optContainer.appendChild(optDiv);
            });

            const answeredCount = answers.filter(a => a !== null).length;
            DOM.progress.style.width = `${(answeredCount / questions.length) * 100}%`;
            DOM.btnPrev.disabled = currentQuestion === 0;
            
            if (currentQuestion === questions.length - 1) {
                DOM.btnNext.classList.add('hidden'); DOM.btnSubmit.classList.remove('hidden');
            } else {
                DOM.btnNext.classList.remove('hidden'); DOM.btnSubmit.classList.add('hidden');
            }
            renderPalette();
        }

        function selectOption(index) { answers[currentQuestion] = index; renderQuestion(); }
        DOM.btnPrev.onclick = () => { if (currentQuestion > 0) { currentQuestion--; renderQuestion(); } };
        DOM.btnNext.onclick = () => { if (currentQuestion < questions.length - 1) { currentQuestion++; renderQuestion(); } };
        DOM.btnSubmit.onclick = () => { if(confirm("क्या आप टेस्ट सबमिट करना चाहते हैं?")) { submitTest(); } };

        function submitTest() {
            clearInterval(timerInterval);
            DOM.testScreen.classList.add('hidden'); DOM.resultScreen.classList.remove('hidden');
            let correct = 0; let wrong = 0; let attempted = 0;

            questions.forEach((q, i) => {
                if (answers[i] !== null) {
                    attempted++;
                    if (answers[i] === q.ans) { correct++; } else { wrong++; }
                }
            });

            const percent = Math.round((correct / questions.length) * 100);
            DOM.scoreVal.innerText = `${correct}/${questions.length}`;
            DOM.percentVal.innerText = `${percent}%`;
            DOM.correctVal.innerText = correct; DOM.wrongVal.innerText = wrong;
            DOM.attemptedVal.innerText = attempted;
            renderReview();
        }

        function renderReview() {
            DOM.reviewContainer.innerHTML = ''; const labels = ['A', 'B', 'C', 'D'];
            questions.forEach((q, i) => {
                const userAns = answers[i]; const isCorrect = userAns === q.ans; const isAttempted = userAns !== null;
                let cardClass = 'unattempted';
                if (isAttempted) { cardClass = isCorrect ? 'correct' : 'wrong'; }

                const card = document.createElement('div'); card.className = `review-card glass-panel ${cardClass}`;
                let optionsHtml = '<div class="review-options">';
                q.opt.forEach((optText, optIndex) => {
                    let optClass = 'review-option';
                    if (optIndex === q.ans) { optClass += ' is-correct'; } 
                    else if (optIndex === userAns && !isCorrect) { optClass += ' is-user-wrong'; }
                    optionsHtml += `<div class="${optClass}">${labels[optIndex]}. ${optText}</div>`;
                });
                optionsHtml += '</div>';

                let statusBadge = '';
                if (!isAttempted) { statusBadge = '<span style="color:var(--warning); font-weight:bold;">[छोड़ दिया - Unattempted]</span>'; } 
                else if (isCorrect) { statusBadge = '<span style="color:var(--success); font-weight:bold;">[सही - Correct]</span>'; } 
                else { statusBadge = '<span style="color:var(--danger); font-weight:bold;">[गलत - Wrong]</span>'; }

                card.innerHTML = `<div class="review-q">प्र. ${i + 1}: ${q.q} ${statusBadge}</div>${optionsHtml}<div class="explanation-box"><div class="explanation-title">समाधान:</div>${q.exp}</div>`;
                DOM.reviewContainer.appendChild(card);
            });
        }
        init();
    </script>
</body>
