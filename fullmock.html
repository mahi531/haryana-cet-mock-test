<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Full Mock Tests - Haryana CET</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Hind:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #fdfbfb 0%, #ebedee 100%);
            --glass-bg: rgba(255, 255, 255, 0.6);
            --glass-border: rgba(255, 255, 255, 0.8);
            --text-color: #2d3436;
            --text-muted: #636e72;
            --card-hover: rgba(255, 255, 255, 0.9);
            --btn-bg: #0984e3;
            --btn-hover: #74b9ff;
            --header-bg: rgba(255, 255, 255, 0.5);
            --shadow: rgba(0, 0, 0, 0.1);
        }
        [data-theme="dark"] {
            --bg-gradient: linear-gradient(135deg, #1e1e2f 0%, #2a2a40 100%);
            --glass-bg: rgba(30, 30, 46, 0.6);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-color: #f5f6fa;
            --text-muted: #b2bec3;
            --card-hover: rgba(45, 45, 65, 0.9);
            --btn-bg: #0984e3;
            --btn-hover: #74b9ff;
            --header-bg: rgba(30, 30, 46, 0.7);
            --shadow: rgba(0, 0, 0, 0.3);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Poppins', 'Hind', sans-serif; transition: background 0.3s ease, color 0.3s ease; }
        body { background: var(--bg-gradient); color: var(--text-color); min-height: 100vh; background-attachment: fixed; }
        
        /* Glassmorphism Header */
        header { display: flex; justify-content: space-between; align-items: center; padding: 15px 30px; background: var(--header-bg); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); border-bottom: 1px solid var(--glass-border); position: sticky; top: 0; z-index: 100; box-shadow: 0 4px 20px var(--shadow); }
        .logo { font-size: 24px; font-weight: 700; text-decoration: none; color: var(--text-color); display: flex; align-items: center; gap: 10px;}
        .header-right { display: flex; align-items: center; gap: 15px; }
        .search-box { padding: 10px 20px; border-radius: 30px; border: 1px solid var(--glass-border); background: var(--glass-bg); color: var(--text-color); outline: none; font-size: 15px; font-weight: 500;}
        .search-box::placeholder { color: var(--text-muted); }
        .theme-toggle { cursor: pointer; background: var(--glass-bg); border: 1px solid var(--glass-border); font-size: 20px; width: 42px; height: 42px; border-radius: 50%; display: flex; justify-content: center; align-items: center; color: var(--text-color); transition: transform 0.2s;}
        .theme-toggle:hover { transform: scale(1.1); }
        .auth-btns button { padding: 9px 18px; border-radius: 20px; border: none; cursor: pointer; font-weight: 600; font-size: 15px; transition: transform 0.2s;}
        .auth-btns button:hover { transform: scale(1.05); }
        .btn-login { background: transparent; color: var(--text-color); border: 2px solid var(--btn-bg) !important; margin-right: 8px; }
        .btn-register { background: var(--btn-bg); color: white; box-shadow: 0 4px 15px rgba(9, 132, 227, 0.4); }

        /* Page Header / Back Button */
        .page-header { padding: 30px; text-align: center; }
        .page-header h1 { font-size: 36px; margin-bottom: 10px; font-weight: 700; }
        .page-header p { color: var(--text-muted); font-size: 18px; margin-bottom: 20px;}
        .back-btn { text-decoration: none; color: white; background: var(--text-muted); padding: 8px 20px; border-radius: 20px; display: inline-block; font-weight: 500; transition: transform 0.2s; }
        .back-btn:hover { transform: translateX(-5px); background: var(--text-color); }

        /* Card Grid Layout */
        .grid-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; padding: 0 30px 50px 30px; max-width: 1400px; margin: 0 auto; }
        .glass-card { background: var(--glass-bg); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border: 1px solid var(--glass-border); border-radius: 20px; padding: 25px; text-align: center; box-shadow: 0 8px 32px 0 var(--shadow); display: flex; flex-direction: column; justify-content: space-between; transition: all 0.3s ease; }
        .glass-card:hover { transform: translateY(-8px); background: var(--card-hover); box-shadow: 0 15px 40px 0 var(--shadow); border-color: var(--btn-bg); }
        .card-icon { font-size: 45px; margin-bottom: 15px; line-height: 1; }
        .card-title { font-size: 22px; font-weight: 700; margin-bottom: 15px; color: var(--text-color); line-height: 1.3;}
        
        .card-details { text-align: left; background: rgba(0,0,0,0.03); padding: 15px; border-radius: 12px; margin-bottom: 20px; display: flex; flex-direction: column; gap: 8px; border: 1px solid var(--glass-border); }
        [data-theme="dark"] .card-details { background: rgba(255,255,255,0.03); }
        .card-details span { display: flex; align-items: center; font-size: 14px; font-weight: 500; color: var(--text-muted); }
        .card-details span strong { color: var(--text-color); margin-left: 8px; font-weight: 600;}

        .card-btn { text-decoration: none; background: var(--btn-bg); color: white; padding: 12px 20px; border-radius: 12px; font-weight: 600; font-size: 16px; transition: background 0.3s, transform 0.2s; box-shadow: 0 4px 15px rgba(9, 132, 227, 0.3); display: flex; justify-content: center; align-items: center; gap: 8px; width: 100%;}
        .card-btn:hover { background: var(--btn-hover); transform: scale(1.02); }

        @media (max-width: 768px) { 
            header { flex-direction: column; gap: 15px; padding: 15px; } 
            .header-right { flex-wrap: wrap; justify-content: center; width: 100%; } 
            .search-box { width: 100%; order: 3; margin-top: 10px; } 
            .grid-container { padding: 0 15px 40px 15px; grid-template-columns: repeat(auto-fill, minmax(100%, 1fr)); }
            .page-header h1 { font-size: 28px; }
        }
    </style>
</head>
<body data-theme="light">
    <header>
        <a href="index.html" class="logo">
            <span style="font-size: 30px;">🎓</span> Haryana CET
        </a>
        <div class="header-right">
            <button class="theme-toggle" id="theme-btn" title="Toggle Theme">🌓</button>
            <div class="auth-btns">
                <button class="btn-login">Login</button>
                <button class="btn-register">Register</button>
            </div>
            <input type="text" id="search-box" class="search-box" placeholder="Search Test (e.g., Mock 1, Mock 5)...">
        </div>
    </header>

    <div class="page-header">
        <a href="index.html" class="back-btn">← Back to Home</a>
        <h1>Full Mock Tests</h1>
        <p>Practice Full Length Haryana CET Mock Tests</p>
    </div>

    <div class="grid-container" id="card-container">
        </div>

    <script>
        // Total number of Mock Tests (Change this to 30, 40, etc., in future to easily add more tests)
        const totalTests = 20; 
        const mockTestData = [];
        
        // Auto-generate array for 20 tests
        for (let i = 1; i <= totalTests; i++) {
            mockTestData.push({
                id: i,
                title: `Full Mock Test ${i}`,
                questions: "100 Questions",
                time: "105 Minutes",
                target: "Haryana CET Group C & D",
                link: `fullmock${i}.html`,
                icon: "📘"
            });
        }
        const container = document.getElementById('card-container');
        const searchBox = document.getElementById('search-box');
        const themeBtn = document.getElementById('theme-btn');

        // Function to render cards on the screen
        function renderCards(data) {
            container.innerHTML = ''; // Clear container
            
            // If search not found
            if(data.length === 0) {
                container.innerHTML = '<p style="grid-column: 1 / -1; text-align: center; font-size: 18px; font-weight: 500; color: var(--danger);">No tests found matching your search.</p>';
                return;
            }
            
            // Create cards
            data.forEach(item => {
                const card = document.createElement('div');
                card.className = 'glass-card';
                card.innerHTML = `
                    <div>
                        <div class="card-icon">${item.icon}</div>
                        <div class="card-title">${item.title}</div>
                        <div class="card-details">
                            <span>📝 <strong>${item.questions}</strong></span>
                            <span>⏱️ <strong>${item.time}</strong></span>
                            <span>🎯 <strong>${item.target}</strong></span>
                        </div>
                    </div>
                    <a href="${item.link}" class="card-btn">▶ Start Test</a>
                `;
                container.appendChild(card);
            });
        }

        // Render all 20 cards initially
        renderCards(mockTestData);

        // Smart Search Box Functionality
        searchBox.addEventListener('input', (e) => {
            const query = e.target.value.toLowerCase().trim();
            // Split the search input into separate words (e.g., "Mock 5" -> ["mock", "5"])
            const queryWords = query.split(' ').filter(word => word.length > 0);
            
            const filtered = mockTestData.filter(item => {
                const titleLower = item.title.toLowerCase();
                // Check if EVERY word typed by user exists in the title
                return queryWords.every(word => titleLower.includes(word));
            });
            renderCards(filtered);
        });

        // Dark/Light Theme Toggle Logic
        themeBtn.addEventListener('click', () => {
            const currentTheme = document.body.getAttribute('data-theme');
            const newTheme = currentTheme === 'light' ? 'dark' : 'light';
            document.body.setAttribute('data-theme', newTheme);
            
            // Change Icon based on theme
            themeBtn.innerText = newTheme === 'light' ? '🌓' : '☀️';
        });
    </script>
</body>
</html>
