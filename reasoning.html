<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Haryana CET - Reasoning Mock Tests</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* Light Theme Variables */
        :root {
            --text-color: #2c3e50;
            --text-muted: #576574;
            --primary-color: #6c5ce7;
            --primary-hover: #5b4bc4;
            --glass-bg: rgba(255, 255, 255, 0.4);
            --glass-border: rgba(255, 255, 255, 0.6);
            --card-glass: rgba(255, 255, 255, 0.5);
            --input-bg: rgba(255, 255, 255, 0.6);
            --shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.15);
        }

        /* Dark Theme Variables */
        [data-theme="dark"] {
            --text-color: #ecf0f1;
            --text-muted: #bdc3c7;
            --primary-color: #a29bfe;
            --primary-hover: #8c82fc;
            --glass-bg: rgba(20, 20, 30, 0.6);
            --glass-border: rgba(255, 255, 255, 0.1);
            --card-glass: rgba(30, 30, 40, 0.6);
            --input-bg: rgba(0, 0, 0, 0.4);
            --shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
            transition: background-color 0.3s, color 0.3s, border-color 0.3s;
        }

        /* Animated Gradient Background (4 Colors) */
        body {
            background: linear-gradient(-45deg, #ff9a9e, #fecfef, #a1c4fd, #c2e9fb);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        [data-theme="dark"] body {
            background: linear-gradient(-45deg, #0f2027, #203a43, #2c5364, #141e30);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Header Styling */
        header {
            position: sticky;
            top: 0;
            z-index: 1000;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 40px;
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--glass-border);
            box-shadow: var(--shadow);
        }

        .logo {
            font-size: 24px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--text-color);
            text-decoration: none;
        }

        .logo i {
            color: var(--primary-color);
            font-size: 28px;
        }

        /* Search Bar */
        .search-container {
            position: relative;
            flex: 1;
            max-width: 400px;
            margin: 0 20px;
        }

        .search-container input {
            width: 100%;
            padding: 10px 20px 10px 45px;
            border-radius: 30px;
            border: 1px solid var(--glass-border);
            background: var(--input-bg);
            color: var(--text-color);
            font-size: 15px;
            outline: none;
            backdrop-filter: blur(5px);
        }

        .search-container input::placeholder {
            color: var(--text-muted);
        }

        .search-container i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
        }

        /* Header Buttons */
        .header-actions {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .theme-btn {
            background: transparent;
            border: none;
            font-size: 22px;
            color: var(--text-color);
            cursor: pointer;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
        }

        .btn {
            padding: 8px 25px;
            border-radius: 25px;
            font-weight: 600;
            font-size: 15px;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.3s ease;
        }

        .btn-outline {
            background: transparent;
            border: 2px solid var(--primary-color);
            color: var(--text-color);
        }

        .btn-outline:hover {
            background: var(--primary-color);
            color: #fff;
        }

        .btn-filled {
            background: var(--primary-color);
            border: 2px solid var(--primary-color);
            color: #fff;
        }

        .btn-filled:hover {
            background: var(--primary-hover);
            border-color: var(--primary-hover);
            transform: translateY(-2px);
        }

        /* Main Content */
        main {
            padding: 40px;
            flex: 1;
            max-width: 1400px;
            margin: 0 auto;
            width: 100%;
        }

        .page-title {
            text-align: center;
            font-size: 36px;
            font-weight: 700;
            margin-bottom: 40px;
            color: var(--text-color);
            text-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        /* Grid Layout */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
        }

        /* Card Styling */
        .mock-card {
            background: var(--card-glass);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 30px 20px;
            text-align: center;
            box-shadow: var(--shadow);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.4s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .mock-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
            border-color: var(--primary-color);
        }

        .card-icon {
            font-size: 45px;
            color: var(--primary-color);
            margin-bottom: 15px;
            background: var(--glass-bg);
            width: 80px;
            height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            border: 1px solid var(--glass-border);
        }

        .card-title {
            font-size: 22px;
            font-weight: 600;
            margin-bottom: 5px;
        }

        .card-subtitle {
            font-size: 14px;
            color: var(--text-muted);
            margin-bottom: 25px;
            font-weight: 500;
        }

        .card-btn {
            margin-top: auto;
            width: 100%;
            text-align: center;
        }

        /* Responsive Design */
        @media (max-width: 900px) {
            header {
                flex-wrap: wrap;
                padding: 15px 20px;
            }
            .search-container {
                order: 3;
                max-width: 100%;
                margin: 15px 0 0 0;
            }
        }

        @media (max-width: 600px) {
            main {
                padding: 20px;
            }
            .page-title {
                font-size: 28px;
            }
            .header-actions .btn {
                padding: 6px 15px;
                font-size: 13px;
            }
            .logo {
                font-size: 20px;
            }
            .logo i {
                font-size: 24px;
            }
        }
    </style>
</head>
<body data-theme="light">

    <header>
        <a href="#" class="logo">
            <i class="fa-solid fa-brain"></i>
            Haryana CET Reasoning
        </a>
        
        <div class="search-container">
            <i class="fa-solid fa-search"></i>
            <input type="text" placeholder="Search mock tests...">
        </div>
        
        <div class="header-actions">
            <button class="theme-btn" id="theme-toggle" title="Toggle Theme">
                <i class="fa-solid fa-moon"></i>
            </button>
            <a href="#" class="btn btn-outline">Login</a>
            <a href="#" class="btn btn-filled">Register</a>
        </div>
    </header>

    <main>
        <h1 class="page-title">Reasoning Mock Tests</h1>
        
        <div class="grid-container" id="card-container">
            </div>
    </main>

    <script>
        // --- Theme Toggle Logic with LocalStorage ---
        const themeToggleBtn = document.getElementById('theme-toggle');
        const themeIcon = themeToggleBtn.querySelector('i');
        const body = document.body;

        // Check for saved theme preference in localStorage
        const savedTheme = localStorage.getItem('theme');
        if (savedTheme) {
            body.setAttribute('data-theme', savedTheme);
            updateThemeIcon(savedTheme);
        }

        // Toggle theme on button click
        themeToggleBtn.addEventListener('click', () => {
            const currentTheme = body.getAttribute('data-theme');
            const newTheme = currentTheme === 'light' ? 'dark' : 'light';
            
            body.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
            updateThemeIcon(newTheme);
        });

        // Function to update the Moon/Sun icon
        function updateThemeIcon(theme) {
            if (theme === 'dark') {
                themeIcon.classList.remove('fa-moon');
                themeIcon.classList.add('fa-sun');
            } else {
                themeIcon.classList.remove('fa-sun');
                themeIcon.classList.add('fa-moon');
            }
        }

        // --- Dynamic Generation of 20 Reasoning Cards ---
        const cardContainer = document.getElementById('card-container');
        
        // Array of different FontAwesome icons for Reasoning to make cards look unique
        const reasoningIcons = [
            'fa-puzzle-piece', 
            'fa-lightbulb', 
            'fa-cogs', 
            'fa-network-wired', 
            'fa-sitemap', 
            'fa-chess-knight', 
            'fa-brain',
            'fa-cubes'
        ];

        // Loop to create 20 cards
        for (let i = 1; i <= 20; i++) {
            // Select an icon from the array (cycles through if i > array length)
            const iconClass = reasoningIcons[(i - 1) % reasoningIcons.length];
            
            // Create Card Element
            const card = document.createElement('div');
            card.className = 'mock-card';
            
            // Insert Card HTML
            card.innerHTML = `
                <div class="card-icon">
                    <i class="fa-solid ${iconClass}"></i>
                </div>
                <h2 class="card-title">Reasoning Part ${i}</h2>
                <div class="card-subtitle">25 Most Important Questions</div>
                <a href="reasoning${i}.html" class="btn btn-filled card-btn">Start Test</a>
            `;
            
            // Append Card to Grid
            cardContainer.appendChild(card);
        }
    </script>
</body>
</html>
